<div class="container mt-5" style="max-width: 500px;">
  <h2 class="mb-4">Signup</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form (ngSubmit)="signup()">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input [(ngModel)]="username" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input [(ngModel)]="email" name="email" type="email" class="form-control" required>
      <small class="text-danger" *ngIf="!email">Email is required</small>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input [(ngModel)]="password" name="password" type="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Signup</button>
  </form>

  <p class="mt-3 text-center">
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>
</div>
